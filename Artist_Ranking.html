<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Indian Artists</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green:  #69e091;
      --dark:   #0d1f17;
      --card:   #122318;
      --accent: #1d4436;
      --text:   #e8f5ee;
      --muted:  #6fa882;
      --gold:   #f5c842;
      --silver: #b0bec5;
      --bronze: #cd7f32;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ---------- HEADER ---------- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid rgba(105,224,145,.15);
      position: sticky;
      top: 0;
      background: rgba(13,31,23,.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      width: 52px; height: 52px;
      border-radius: 12px; object-fit: cover;
    }
    .site-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; letter-spacing: .12em; color: var(--green);
    }
    .nav-btn {
      background: transparent;
      border: 1.5px solid var(--green);
      color: var(--green); border-radius: 100px;
      padding: 9px 22px;
      font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: background .2s, color .2s;
      text-decoration: none; display: inline-block;
    }
    .nav-btn:hover { background: var(--green); color: var(--dark); }

    /* ---------- HERO ---------- */
    .hero { text-align: center; padding: 60px 20px 40px; }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: .06em; line-height: 1;
      background: linear-gradient(135deg, var(--green), #a8f5c0, var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero p { color: var(--muted); margin-top: 12px; font-size: .95rem; letter-spacing: .04em; }
    #last-updated {
      display: inline-block; margin-top: 14px; font-size: .8rem; color: var(--muted);
      border: 1px solid rgba(105,224,145,.2); border-radius: 100px; padding: 4px 14px;
    }

    /* ---------- PODIUM (top 3) ---------- */
    .podium {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 20px;
      max-width: 680px;
      margin: 0 auto 40px;
      padding: 0 24px;
    }
    .podium-card {
      flex: 1;
      background: var(--card);
      border-radius: 20px;
      padding: 20px 12px;
      text-align: center;
      border: 1px solid rgba(105,224,145,.1);
      position: relative;
      transition: transform .2s;
      max-width: 200px;
    }
    .podium-card:hover { transform: translateY(-4px); }
    .podium-card.rank-1 {
      border-color: rgba(245,200,66,.5);
      box-shadow: 0 0 28px rgba(245,200,66,.12);
      order: 2;
      padding-top: 28px;
    }
    .podium-card.rank-2 { order: 1; }
    .podium-card.rank-3 { order: 3; }

    .podium-badge {
      position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .rank-1 .podium-badge { background: var(--gold);   color: #333; }
    .rank-2 .podium-badge { background: var(--silver); color: #333; }
    .rank-3 .podium-badge { background: var(--bronze); color: #fff; }

    .podium-img {
      width: 72px; height: 72px;
      border-radius: 50%; object-fit: cover;
      border: 3px solid var(--accent);
      margin: 8px auto;
      display: block;
      background: var(--accent);
    }
    .rank-1 .podium-img { width: 88px; height: 88px; border-color: var(--gold); }

    .podium-name {
      font-weight: 600; font-size: .88rem;
      color: var(--text); margin-top: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .podium-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem; color: var(--green); margin-top: 4px;
    }
    .podium-score span { font-family: 'DM Sans', sans-serif; font-size: .7rem; color: var(--muted); font-weight: 400; }

    /* ---------- REST OF LIST ---------- */
    .artists-list {
      display: flex; flex-direction: column; gap: 10px;
      max-width: 860px; margin: 0 auto; padding: 0 24px 60px;
    }

    .artist-row {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 18px;
      display: flex; align-items: center; gap: 16px;
      border: 1px solid rgba(105,224,145,.07);
      transition: border-color .2s, transform .15s;
      animation: slide-in .4s both;
    }
    .artist-row:hover { border-color: rgba(105,224,145,.3); transform: translateX(4px); }

    @keyframes slide-in {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .row-rank {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem; color: var(--muted);
      min-width: 32px; text-align: right;
    }
    .row-img {
      width: 52px; height: 52px;
      border-radius: 50%; object-fit: cover;
      background: var(--accent); flex-shrink: 0;
      border: 2px solid var(--accent);
    }
    .row-info { flex: 1; min-width: 0; }
    .row-name {
      font-weight: 600; font-size: .95rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .row-score { font-size: .82rem; color: var(--muted); margin-top: 3px; }
    .row-score strong { color: var(--green); font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: .04em; }

    /* scorebar */
    .score-bar-wrap { flex-shrink: 0; width: 80px; }
    .score-bar {
      height: 4px; background: rgba(105,224,145,.15);
      border-radius: 2px; overflow: hidden;
    }
    .score-bar-fill {
      height: 100%; background: var(--green); border-radius: 2px;
      transition: width .6s ease;
    }

    .status { text-align: center; padding: 80px 20px; color: var(--muted); }

    @media (max-width: 540px) {
      header { padding: 16px 20px; }
      .podium { gap: 10px; }
      .score-bar-wrap { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <img src="assets/Socbizz_Logo.png" class="logo" alt="SocBizIITR" onerror="this.style.display='none'" />
    <span class="site-title">SocBizIITR</span>
    <a class="nav-btn" href="index.html">← Top Songs</a>
  </header>

  <section class="hero">
    <h1>Indian Artists</h1>
    <p>Ranked by kworb.net iTunes Today Score · Updated Daily</p>
    <span id="last-updated">Loading…</span>
  </section>

  <!-- Top 3 podium -->
  <div class="podium" id="podium"></div>

  <!-- Rank 4 onwards -->
  <div class="artists-list" id="artists-list">
    <div class="status">Fetching artist rankings…</div>
  </div>

  <script>
    fetch("data/Top_Indian_Artist.json")
      .then(r => r.json())
      .then(raw => {
        // skip the header object at index 0
        const data = raw.slice(1).map(d => ({
          name:  d["A"],
          score: parseFloat(d["B"]) || 0,
          image: d["C"] || ""
        }));

        document.getElementById("last-updated").textContent =
          "Updated " + new Date().toLocaleDateString("en-IN", {day:"numeric", month:"short", year:"numeric"});

        if (!data.length) {
          document.getElementById("artists-list").innerHTML = '<div class="status">No artists found.</div>';
          return;
        }

        const maxScore = data[0].score || 1;

        // ----- PODIUM (top 3) -----
        const podium = document.getElementById("podium");
        const medals = ["rank-1","rank-2","rank-3"];
        const medalNums = ["1","2","3"];
        podium.innerHTML = data.slice(0, 3).map((a, i) => `
          <div class="podium-card ${medals[i]}">
            <div class="podium-badge">${medalNums[i]}</div>
            <img class="podium-img" src="${a.image}" alt="${a.name}"
                 onerror="this.src='https://placehold.co/88x88/1d4436/69e091?text=${encodeURIComponent(a.name[0])}'" />
            <div class="podium-name">${a.name}</div>
            <div class="podium-score">${a.score.toLocaleString()} <span>Today</span></div>
          </div>`).join("");

        // ----- LIST (rank 4+) -----
        const list = document.getElementById("artists-list");
        list.innerHTML = data.slice(3).map((a, i) => {
          const rank = i + 4;
          const pct = Math.round((a.score / maxScore) * 100);
          return `
            <div class="artist-row" style="animation-delay:${Math.min(i * 0.025, 1.2)}s">
              <div class="row-rank">${rank}</div>
              <img class="row-img" src="${a.image}" alt="${a.name}"
                   onerror="this.src='https://placehold.co/52x52/1d4436/69e091?text=${encodeURIComponent(a.name[0])}'" />
              <div class="row-info">
                <div class="row-name">${a.name}</div>
                <div class="row-score"><strong>${a.score.toLocaleString()}</strong> iTunes Today</div>
              </div>
              <div class="score-bar-wrap">
                <div class="score-bar">
                  <div class="score-bar-fill" style="width:${pct}%"></div>
                </div>
              </div>
            </div>`;
        }).join("");
      })
      .catch(err => {
        document.getElementById("artists-list").innerHTML =
          '<div class="status">Could not load artist data. Make sure data/Top_Indian_Artist.json exists.</div>';
        console.error(err);
      });
  </script>

</body>
</html>
